name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

  static:
    runs-on: ubuntu-latest
    needs: setup
    if: "!cancelled()"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          nx-shas: "true"

      - name: No direct axios in apps/ui
        if: "!cancelled()"
        run: bun scripts/check-no-direct-http.ts

      - name: No prop drilling in React components
        if: "!cancelled()"
        run: bun scripts/check-prop-drilling.ts

      - name: Hooks must live in useSomething files
        if: "!cancelled()"
        run: bun scripts/check-hooks-location.ts

      - name: Folder size check
        if: "!cancelled()"
        run: bun scripts/check-folder-size.ts

      - name: Single component per TSX file
        if: "!cancelled()"
        run: bun scripts/check-single-component.ts

      - name: Static error messages (no template literals in Error/Exception constructors)
        if: "!cancelled()"
        run: bun scripts/check-static-error-messages.ts

      - name: No unsafe casts (as any / as unknown)
        if: "!cancelled()"
        run: bash scripts/check-no-unsafe-casts.sh

      - name: Shellcheck
        if: "!cancelled()"
        run: find . -name '*.sh' -not -path '*/node_modules/*' -not -path '*/.husky/_/*' | xargs shellcheck

      - name: Lint (affected)
        if: "!cancelled()"
        run: bun run lint:ci

      - name: Format check (affected)
        if: "!cancelled()"
        run: bun run fmt:ci

      - name: Typecheck (affected)
        if: "!cancelled()"
        run: bun run typecheck:ci
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Spell check
        if: "!cancelled()"
        run: bunx cspell "**/*.{ts,tsx,js,mjs,mts,json,md}" --no-progress

      - name: Circular dependency check
        if: "!cancelled()"
        run: bun run check:circular:ci

      - name: Unused dependency check
        if: "!cancelled()"
        run: bun run check:unused:ci

      - name: Outdated dependency check
        if: "!cancelled()"
        run: bun scripts/check-outdated.ts

  test:
    runs-on: ubuntu-latest
    needs: setup
    if: "!cancelled()"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          nx-shas: "true"

      - name: Test affected files + coverage
        if: "!cancelled()"
        run: bun run test:affected-files:coverage:ci

      - name: Test (full) # local-ci: skip
        if: "!cancelled() && startsWith(github.ref, 'refs/tags/v')"
        run: bun run test:ci

      - name: Test coverage (full) # local-ci: skip
        if: "!cancelled() && startsWith(github.ref, 'refs/tags/v')"
        run: bun run test:coverage:ci

  build:
    runs-on: ubuntu-latest
    needs: setup
    if: "!cancelled()"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          nx-shas: "true"

      - name: Security audit
        if: "!cancelled()"
        run: bun audit --audit-level=high
        continue-on-error: true

      - name: Install Tauri system dependencies # local-ci: skip
        if: "!cancelled() && runner.os == 'Linux'"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build (affected)
        if: "!cancelled()"
        run: bun run build:ci

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:ci

      - name: Format
        run: bun run fmt:ci

      - name: Typecheck
        run: bun run typecheck:ci

      - name: Test
        run: bun run test:ci

      - name: Coverage
        run: bun run test:coverage:ci

      - name: Circular deps
        run: bun run check:circular:ci
